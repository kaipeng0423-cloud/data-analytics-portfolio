name: Refresh data and deploy Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"
  push:
    branches: ["main"]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Refresh macro data from FRED
        run: python scripts/refresh_macro.py
      - name: Check and refresh Retailrocket source
        run: python scripts/refresh_ecommerce.py
      - name: Persist Retailrocket version change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ecommerce_source_state.json site/ecommerce/data.js
          git diff --cached --quiet || git commit -m "Refresh Retailrocket dashboard"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
