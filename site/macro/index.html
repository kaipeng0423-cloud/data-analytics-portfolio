<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>宏观经济与金融风险数据看板</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">MACRO & MARKET RISK DATA DASHBOARD</p>
      <h1>宏观经济与金融风险数据看板</h1>
      <p>FRED 官方数据每日增量抓取，展示利率、市场、通胀、就业等核心指标。</p>
    </div>
    <div class="header-links">
      <button onclick="window.print()" class="btn-pdf">下载 PDF 报表</button>
      <a href="../ecommerce/" class="header-link">电商看板</a>
      <a href="../" class="header-link">作品集主页</a>
    </div>
  </header>

  <main>
    <section class="toolbar">
      <div class="toolbar-left">
        <span id="refresh-status" class="badge"></span>
        <span id="latest-date"></span>
      </div>
      <div class="toolbar-right">
        <label>快捷窗口
          <select id="window-filter">
            <option value="1">最近 1 年</option>
            <option value="3">最近 3 年</option>
            <option value="5" selected>最近 5 年</option>
            <option value="10">最近 10 年</option>
          </select>
        </label>
        <label>自定义
          <input id="start-date" type="date">
          <span style="color:var(--muted);margin:0 4px">—</span>
          <input id="end-date" type="date">
        </label>
      </div>
    </section>

    <h3 class="kpi-section-title">📊 窗口指标</h3>
    <section id="kpis-window" class="kpis"></section>
    <h3 class="kpi-section-title" style="margin-top:16px">📋 全局指标（最新快照）</h3>
    <section id="kpis-global" class="kpis"></section>

    <section class="grid main-grid">
      <article class="panel hero">
        <div class="panel-head"><div><h3>综合风险指数</h3></div><p>滚动历史百分位加权，0—100，虚线标记 75 分位</p></div>
        <div id="risk-chart" class="chart"></div>
      </article>
      <article class="panel">
        <div class="panel-head"><div><h3>国债收益率与期限利差</h3></div></div>
        <div id="yield-chart" class="chart"></div>
      </article>
    </section>

    <section class="grid two">
      <article class="panel">
        <div class="panel-head"><div><h3>市场压力指标</h3></div></div>
        <div id="stress-chart" class="chart"></div>
      </article>
      <article class="panel">
        <div class="panel-head"><div><h3>通胀与就业</h3></div></div>
        <div id="macro-chart" class="chart"></div>
      </article>
    </section>

    <section class="grid two">
      <article class="panel">
        <div class="panel-head"><div><h3>风险区间与后续市场表现</h3></div></div>
        <div id="regime-chart" class="chart"></div>
      </article>
      <article class="panel">
        <div class="panel-head"><div><h3>风险跃升事件</h3></div></div>
        <div id="event-study"></div>
      </article>
    </section>

    <section class="panel">
      <div class="panel-head"><div><h3>数据源更新状态</h3></div><p>不同序列按官方发布频率更新</p></div>
      <div class="table-wrap"><table id="freshness-table"></table></div>
    </section>
  </main>

  <footer>FRED · Python · Pandas · SQLite · Plotly · GitHub Actions</footer>
  <script src="plotly.min.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
