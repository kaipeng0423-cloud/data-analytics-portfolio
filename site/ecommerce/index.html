<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Retailrocket 电商用户行为数据看板</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">RETAILROCKET · ECOMMERCE USER BEHAVIOR</p>
      <h1>电商用户行为数据看板</h1>
      <p class="intro">基于 Retailrocket 275.6 万条真实行为事件，展示流量、行为触达、品类表现等核心数据。</p>
    </div>
    <div class="header-links">
      <a href="./macro/" class="header-link">宏观看板</a>
      <a href="../" class="header-link">作品集主页</a>
    </div>
  </header>

  <main>
    <section class="project-head">
      <div>
        <p class="eyebrow">DATE RANGE</p>
        <div class="range-controls">
          <select id="window-filter">
            <option value="all">全部日期</option>
            <option value="60">最近 60 天</option>
            <option value="30">最近 30 天</option>
          </select>
        </div>
        <div class="range-controls" style="margin-top:6px">
          <input type="range" id="range-slider" class="range-slider">
          <span id="range-label" class="range-label"></span>
        </div>
        <div class="range-controls" style="margin-top:4px">
          <span class="range-sep">自定义：</span>
          <input id="start-date" type="date">
          <span class="range-sep">—</span>
          <input id="end-date" type="date">
        </div>
      </div>
    </section>

    <section class="kpi-section">
      <h3 class="kpi-section-title">📊 窗口指标</h3>
      <section id="kpi-grid-window" class="kpi-grid"></section>
      <h3 class="kpi-section-title" style="margin-top:20px">📋 全局指标</h3>
      <section id="kpi-grid-global" class="kpi-grid"></section>
    </section>

    <section class="grid two">
      <article class="panel wide">
        <div class="panel-head">
          <div><h3>日活跃访客趋势</h3></div>
          <p class="panel-note">拖动底部滑块或选择日期范围筛选</p>
        </div>
        <div id="trend-chart" class="chart chart-tall"></div>
      </article>
      <article class="panel">
        <div class="panel-head">
          <div><h3>行为触达访客</h3></div>
        </div>
        <div id="structure-chart" class="chart"></div>
      </article>
    </section>

    <section class="grid two">
      <article class="panel">
        <div class="panel-head">
          <div><h3>分时事件分布</h3></div>
        </div>
        <div id="hourly-chart" class="chart"></div>
      </article>
      <article class="panel">
        <div class="panel-head">
          <div><h3>访客分层</h3></div>
        </div>
        <div id="segment-chart" class="chart"></div>
      </article>
    </section>

    <section class="panel detail-panel">
      <div class="panel-head">
        <div><h3>品类表现明细（浏览量 ≥ 1,000）</h3></div>
        <input id="table-search" type="search" placeholder="搜索品类">
      </div>
      <div class="table-wrap"><table id="detail-table"></table></div>
    </section>
  </main>

  <footer>
    <span>数据来源：Kaggle Retailrocket · Python · SQLite · Plotly</span>
    <span>数据已完成一致性校验</span>
  </footer>

  <script src="plotly.min.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
